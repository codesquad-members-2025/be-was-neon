    <title>사용자 목록</title>
    <style>
        .wrapper {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 0;
            list-style: none;
            margin-top: 30px;
        }
        .user-list__item {
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: center;
        }
        .user-list__img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #ccc;
        }
        .user-list__name {
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
