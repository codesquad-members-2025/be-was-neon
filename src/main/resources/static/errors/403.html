<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>403 - 접근 금지</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            color: #343a40;
        }

        .error-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 72px;
            margin: 0;
            color: #fd7e14;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 24px;
            font-weight: 500;
        }

        p {
            color: #6c757d;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background-color: #0d6efd;
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 4px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #0b5ed7;
        }

        .lock-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="error-container">
    <h1>403</h1>
    <h2>접근이 금지되었습니다</h2>
    <p>
        죄송합니다. 이 페이지에 접근할 권한이 없습니다.
        로그인이 필요하거나 권한이 제한된 페이지일 수 있습니다.
    </p>
    <a href="/login/index.html" class="btn">로그인하기</a>
    <br><br>
    <a href="/" class="btn" style="background-color: #6c757d;">홈페이지로 돌아가기</a>
</div>
</body>
</html>
