<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>409 - 충돌</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            color: #343a40;
        }

        .error-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 72px;
            margin: 0;
            color: #ffc107;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 24px;
            font-weight: 500;
        }

        p {
            color: #6c757d;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background-color: #0d6efd;
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 4px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #0b5ed7;
        }

        .secondary-btn {
            background-color: #6c757d;
            margin-top: 10px;
        }

        .secondary-btn:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
<div class="error-container">
    <h1>409</h1>
    <h2>충돌이 발생했습니다</h2>
    <p>
        이미 사용 중인 아이디입니다.
        다른 아이디를 사용하거나 로그인을 시도해 주세요.
    </p>
    <a href="/registration/index.html" class="btn">회원가입으로 돌아가기</a>
    <br>
    <a href="/login/index.html" class="btn secondary-btn">로그인하기</a>
</div>
</body>
</html>
