<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사용자 목록</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 30px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 35px;
            font-size: 2.2em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
            font-size: 0.95em;
            min-width: 600px;
        }

        thead tr {
            background-color: #3498db;
            color: white;
            text-align: left;
        }

        th, td {
            padding: 15px 20px;
            border-bottom: 1px solid #dddddd;
            vertical-align: middle;
        }

        th {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        tbody tr:nth-of-type(even) {
            background-color: #f8f9fa;
        }

        tbody tr:last-of-type {
            border-bottom: 2px solid #3498db;
        }

        tbody tr:hover {
            background-color: #f1f4f7;
            transition: background-color 0.3s ease;
        }

        td {
            color: #444;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 15px;
            }

            table {
                min-width: unset;
                font-size: 0.85em;
            }

            th, td {
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>사용자 관리 시스템</h1>
    <table>
        <thead>
        <tr>
            <th>아이디</th>
            <th>이름</th>
            <th>이메일</th>
        </tr>
        </thead>
        <tbody>
        ${users}
        </tbody>
    </table>
</div>
</body>
</html>
