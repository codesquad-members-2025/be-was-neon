<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/reset.css" rel="stylesheet" />
    <link href="/global.css" rel="stylesheet" />
    <link href="/main.css" rel="stylesheet" />
</head>
<body>
<div class="container">
    <header class="header">
        <a href="/"><img src="../img/signiture.svg" /></a>
        <ul class="header__menu">
            {{greeting}}
            {{loginOrLogout}}
            <li class="header__menu__item">
                <a class="btn btn_ghost btn_size_s" href="/registration/index.html">
                    회원 가입
                </a>
            </li>
            <li class="header__menu__item">
                <a class="btn btn_ghost btn_size_s" href="/user/list.html">
                    회원 목록
                </a>
            </li>
        </ul>
    </header>
    <div class="wrapper">
        <div class="post">
            <div class="post__account">
                <img class="post__account__img" />
                <p class="post__account__nickname">{{nickname}}</p>
            </div>
            <div>
                <p class="post__account__nickname">{{title}}</p>
                <p class="post__article">작성 일자 : {{createdAt}}</p>
            </div>
            <p class="post__article">
                {{content}}
            </p>
            <div class="post__menu">
                <ul class="post__menu__personal">
                    <li>
                        <button class="post__menu__btn">
                            <img src="/img/like.svg" />
                        </button>
                    </li>
                    <li>
                        <button class="post__menu__btn">
                            <img src="/img/sendLink.svg" />
                        </button>
                    </li>
                </ul>
                <button class="post__menu__btn">
                    <img src="/img/bookMark.svg" />
                </button>
            </div>
        </div>
        <nav class="nav">
            <ul class="nav__menu">
                <li class="nav__menu__item__btn">
                    <a href="/article/write.html" class="btn btn_ghost btn_size_m">글쓰기</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
